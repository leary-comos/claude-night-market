# Egregore Convention Codex v1
#
# Review conventions extracted from PR history analysis.
# Each convention defines a check that runs during the
# quality stage of egregore's pipeline.
#
# check_type:
#   grep    - regex pattern applied to file contents
#   paths   - checks if files exist in the changeset
#   custom  - calls a registered Python checker function
#   skill   - delegates to an existing night-market skill
#
# severity:
#   blocking - prevents pipeline advancement
#   warning  - logged but does not block

version: 1

conventions:
  - id: C1
    name: top-level-imports
    description: >
      All imports must be at module top level.
      No function-level or conditional imports in
      production code. Hook files with optional deps
      are exempt.
    check_type: grep
    grep_pattern: '^\s+(import |from \S+ import )'
    file_globs:
      - "**/*.py"
    exempt_paths:
      - "**/hooks/*.py"
      - "**/conftest.py"
    severity: blocking
    enabled: true

  - id: C2
    name: no-committed-artifacts
    description: >
      Ephemeral planning docs (attune artifacts,
      brainstorm sessions) must not be committed.
    check_type: paths
    check_paths:
      - "docs/project-brief.md"
      - "docs/specification.md"
      - "docs/implementation-plan.md"
      - ".attune/"
    severity: blocking
    enabled: true

  - id: C3
    name: no-destructive-git-ops
    description: >
      No git checkout, git reset --hard, or
      unguarded git stash in code or skills.
      Use git restore or git show instead.
    check_type: grep
    grep_pattern: 'git (checkout|reset\s+--hard|stash(?!\s+list))'
    file_globs:
      - "**/*.py"
      - "**/*.sh"
      - "**/*.md"
    exempt_paths: []
    severity: blocking
    enabled: true

  - id: C4
    name: no-noqa-suppression
    description: >
      Do not suppress lint warnings with noqa,
      type ignore, or pylint disable. Fix the
      underlying issue. Hook files with optional
      deps are exempt.
    check_type: grep
    grep_pattern: '(#\s*noqa|#\s*type:\s*ignore|#\s*pylint:\s*disable)'
    file_globs:
      - "**/*.py"
    exempt_paths:
      - "**/hooks/*.py"
    severity: warning
    enabled: true

  - id: C5
    name: consolidate-docs
    description: >
      New documentation should be consolidated into
      existing files rather than added as separate
      standalone markdown. Flags new .md files
      outside of skills/ and modules/.
    check_type: custom
    checker: check_doc_consolidation
    severity: warning
    enabled: true
