# doc-sync configuration for claude-night-market
# See docs/doc-sync-spec.md for full specification
version: 1

mappings:
  - name: plugin-capabilities
    source: "plugins/*/.claude-plugin/plugin.json"
    extract:
      - path: "skills"
        strip_prefix: "./skills/"
      - path: "commands"
        strip_prefix: "./commands/"
        strip_suffix: ".md"
      - path: "agents"
        strip_prefix: "./agents/"
        strip_suffix: ".md"
    targets:
      - path: "book/src/reference/capabilities-reference.md"
        section: "### All {type}s (Alphabetical)"
        format: "| `{name}` | [{plugin}](../plugins/{plugin}.md) | {description} |"

defaults:
  on_missing: warn
  on_extra: warn
  auto_fix: false
